name: SonarCloud Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, test and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: SonarCloud Scan (docker sonar-scanner-cli)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/usr/src \
            -w /usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.login="${{ secrets.SONAR_TOKEN }}" \
            -Dsonar.organization="christianalfonsoromeromartinez-1" \
            -Dsonar.projectKey="ChristianAlfonsoRomeroMartinez_dvnaFDSI" \
            -Dsonar.sources=. \
            -Dsonar.exclusions="node_modules/**,public/**,docs/**,**/*.md"